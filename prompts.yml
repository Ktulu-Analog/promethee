      - legifrance_tools
      - web_tools
      - data_file_tools
      - data_tools
      - system_tools
      - export_tools
      - export_template_tools
      - skill_tools
      disabled:
      - python_tools
      - sql_tools
    skills:
      pinned:
      - workflow_legifrance
      - guide_redactionnel_administratif
